<svg width="680" height="560" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg" role="img">
<title>FMCG newsletter pipeline architecture</title>
<desc>A five-stage pipeline: NewsAPI ingestion, cleaning and deduplication, relevance and credibility scoring, Gemini newsletter generation, and the Streamlit app that displays the result.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect width="680" height="560" fill="#ffffff"/>

<line x1="80" y1="52" x2="180" y2="52" stroke="#5f5e5a" stroke-width="0.5" marker-end="url(#arrow)"/>
<text x="40" y="56" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5f5e5a">News</text>

<g>
<rect x="180" y="24" width="320" height="56" rx="8" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.5"/>
<text x="340" y="42" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#0c447c">1. Ingestion</text>
<text x="340" y="60" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#185fa5">NewsAPI, 6 FMCG deal queries</text>
</g>

<line x1="340" y1="80" x2="340" y2="120" stroke="#5f5e5a" stroke-width="0.5" marker-end="url(#arrow)"/>

<g>
<rect x="180" y="120" width="320" height="56" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text x="340" y="138" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">2. Clean and deduplicate</text>
<text x="340" y="156" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0f6e56">Exact URL + TF-IDF near-dup removal</text>
</g>

<line x1="340" y1="176" x2="340" y2="216" stroke="#5f5e5a" stroke-width="0.5" marker-end="url(#arrow)"/>

<g>
<rect x="180" y="216" width="320" height="56" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text x="340" y="234" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">3. Relevance and credibility</text>
<text x="340" y="252" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0f6e56">FMCG + deal keyword filter, source tier</text>
</g>

<line x1="340" y1="272" x2="340" y2="312" stroke="#5f5e5a" stroke-width="0.5" marker-end="url(#arrow)"/>

<g>
<rect x="180" y="312" width="320" height="56" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
<text x="340" y="330" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#3c3489">4. Newsletter generation</text>
<text x="340" y="348" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#534ab7">Gemini 3.5 Flash summarizes deals</text>
</g>

<line x1="340" y1="368" x2="340" y2="408" stroke="#5f5e5a" stroke-width="0.5" marker-end="url(#arrow)"/>

<g>
<rect x="180" y="408" width="320" height="56" rx="8" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
<text x="340" y="426" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#712b13">5. Streamlit app</text>
<text x="340" y="444" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#993c1d">Displays newsletter, CSV/JSON export</text>
</g>

<line x1="340" y1="464" x2="340" y2="500" stroke="#5f5e5a" stroke-width="0.5" marker-end="url(#arrow)"/>
<text x="340" y="516" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5f5e5a">Business user reads newsletter</text>

</svg>
